name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # GITHUB_TOKEN cannot trigger downstream workflows, so the chart is
      # published by an inline job below (same run) rather than a separate
      # tag-triggered workflow.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-chart:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0

      # Regenerate the README from Chart.yaml (already bumped to the new version
      # by release-please on this commit) so the PACKAGED chart's docs match the
      # release. This only updates the working tree — the standalone
      # helm-docs.yml workflow still keeps main's README in sync separately, so
      # there's no push race here.
      - name: Install helm-docs
        uses: envoy/install-helm-docs@05313083ef2cfaea27c4c3d7cb725242d22ea88b # v1.0.0
        with:
          version: 1.12.0

      - name: Render helm-docs into the working tree
        shell: bash
        run: helm-docs -t README.md.gotmpl

      - name: get helm dependencies
        shell: bash
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build

      - name: Chart | Push
        uses: appany/helm-oci-chart-releaser@v0.5.0
        with:
          name: onetimesecret
          repository: ${{ github.repository }}
          tag: ${{ needs.release-please.outputs.tag_name }}
          path: . # Default charts/{name}
          registry: ghcr.io
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          update_dependencies: 'true' # Defaults to false
